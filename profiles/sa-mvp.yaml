name: sa-mvp
description: |
  SA daily minimum set — three signal sources (meeting summary, IM digest,
  dashboard watch) flowing into sa-wiki, plus the wiki read/write skills.
  Validates the "data foundation as shared memory" thesis end-to-end.
audience: SA

includes:
  # data foundation (read + write paths)
  - sa-wiki: "^0.2"

  # signal producers
  - meeting-summary: "^0.1"    # ✅ implemented
  - im-digest: "^0.3"          # ✅ implemented
  - dashboard-watch: "^0.1"    # ✅ implemented

  # local wiki bootstrap
  - local-wiki-init: "^0.1"    # ✅ implemented

  # reader / consumer
  - customer-lookup: "^0.1"    # ⏳ pending

notes: |
  4 of 5 core skills implemented (meeting-summary, im-digest, dashboard-watch,
  local-wiki-init). Only customer-lookup remains for MVP completion.
  All skills follow core/local-wiki-ux.md UX standard.
