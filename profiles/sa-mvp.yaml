name: sa-mvp
description: |
  SA daily minimum set — live recording, meeting history, IM digest, C360,
  and document ingestion flowing into polym-sa-wiki, plus local wiki bootstrap,
  customer briefing, and onboarding help.
audience: SA

includes:
  # data foundation (read + write paths)
  - polym-sa-wiki: "^0.2"

  # signal producers
  - polym-meeting-summary: "^0.1"    # ✅ implemented
  # - polym-meeting-recorder: "^0.1" # ⏸ disabled this release — Syncore upstream unstable, re-enable once stable
  - polym-im-digest: "^0.3"          # ✅ implemented
  - polym-dashboard-watch: "^0.1"    # ✅ implemented

  # local wiki bootstrap
  - polym-local-wiki-init: "^0.1"    # ✅ implemented

  # reader / consumer
  - polym-customer-brief: "^0.1"     # ✅ implemented

  # onboarding
  - polym-help: "^0.2" # ✅ implemented

notes: |
  All core skills implemented. MVP complete.
  All skills follow core/local-wiki-ux.md UX standard (no "双写" exposed to users).
  polym-meeting-recorder is temporarily excluded from this release while the
  Syncore upstream stabilizes — the skill code still ships in the repo and can
  be installed directly via `polym install polym-meeting-recorder`.
