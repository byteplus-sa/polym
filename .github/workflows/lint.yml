name: lint-and-registry

on:
  pull_request:
    paths:
      - "skills/**"
      - "profiles/**"
      - "core/**"
      - "manifest.schema.yaml"
      - "profile.schema.yaml"
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "profiles/**"

jobs:
  lint:
    name: Lint skill manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Run lint
        run: bash tools/lint.sh

  build-registry:
    name: Rebuild registry.yaml
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Build registry
        run: bash tools/build-registry.sh
      - name: Commit registry if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --ff-only origin main || git pull --no-rebase origin main
          bash tools/build-registry.sh
          git add registry.yaml
          if git diff --cached --quiet; then
            echo "registry.yaml unchanged — nothing to commit"
          else
            git commit -m "chore: rebuild registry.yaml [skip ci]"
            git push
          fi
