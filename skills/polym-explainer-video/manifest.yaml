name: polym-explainer-video
version: 0.1.0
stage: experimental
owners:
  - "@bojie"
description_for_install: |
  Build a polished short-form product/demo explainer video from docs, URLs, PDFs,
  screenshots, or free-form text via a 5-phase flow with storyboard approval,
  verification, and optional AI presenter + music generation.

depends_on:
  skills: []
  binaries:
    - node: ">=22"
    - ffmpeg: "*"
    - lark-cli: ">=1.0.20"
  env: []

io_contract:
  reads: []
  writes: []

triggers:
  - "make an explainer video"
  - "make a short-form video about"
  - "turn this repo into a video"
  - "produce a tiktok video"
  - "产品介绍视频"
  - "产品讲解视频"

deprecates: []
