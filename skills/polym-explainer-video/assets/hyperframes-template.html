<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=WIDTH_PLACEHOLDER, height=HEIGHT_PLACEHOLDER" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/TextPlugin.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: WIDTH_PLACEHOLDERpx;
        height: HEIGHT_PLACEHOLDERpx;
        overflow: hidden;
        background: BG_COLOR_PLACEHOLDER;
        font-family: FONT_FAMILY_PLACEHOLDER;
        -webkit-font-smoothing: antialiased;
        text-rendering: geometricPrecision;
      }
      .clip {
        position: absolute;
        top: 0;
        left: 0;
        width: WIDTH_PLACEHOLDERpx;
        height: HEIGHT_PLACEHOLDERpx;
      }
      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .caption {
        position: absolute;
        bottom: 220px;
        left: 40px;
        right: 40px;
        text-align: center;
        font-size: 38px;
        font-weight: 700;
        color: #fff;
        line-height: 1.25;
        letter-spacing: -0.02em;
      }
      .caption-bg {
        background: rgba(0, 0, 0, 0.6);
        padding: 14px 22px;
        border-radius: 14px;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="DURATION_PLACEHOLDER"
      data-width="WIDTH_PLACEHOLDER"
      data-height="HEIGHT_PLACEHOLDER"
    >
<!-- ELEMENTS_PLACEHOLDER -->
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

// TIMELINE_PLACEHOLDER

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
