name: polym-eval-generate-gemini
version: 0.1.0
stage: beta
owners:
  - Carey8175
description_for_install: |
  Generate or edit images with Gemini/Imagen through Google or ByteDance AIDP
  backends. Supports text prompts, reference images, image sizes, and backend
  preflight guidance.
depends_on:
  skills: []
  binaries:
    - python3: ">=3.10"
  env:
    - GOOGLE_AI_STUDIO_API_KEY
    - AIDP_API_KEY
io_contract:
  reads:
    - local-filesystem/reference-images
  writes:
    - target: local-filesystem/generated-assets
      schema: core/signal-envelope.schema.json
      signal_type: generated-image
triggers:
  - "generate Gemini image"
  - "Imagen"
  - "Nano Banana"
deprecates: []
