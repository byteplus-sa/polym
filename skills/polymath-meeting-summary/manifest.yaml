name: polymath-meeting-summary
version: 0.1.1
stage: beta
owners:
  - Carey8175

description_for_install: |
  Organises all Lark meetings (VC + Lark Minutes) within a time window into structured
  knowledge. Default range: yesterday 00:00 to now. Extracts decisions, customer
  feedback, feature asks, risk signals and more across 10 dimensions, then saves
  to the knowledge base automatically. Prioritises Lark Minutes AI summaries; falls back
  to transcripts or VC details.

depends_on:
  skills:
    - polymath-sa-wiki: "^0.2"
    - polymath-local-wiki-init: "^0.1"
  binaries:
    - lark-cli: ">=1.0.20"
  env: []

io_contract:
  reads:
    - lark-vc/meetings
    - lark-minutes/transcripts
  writes:
    - target: local-filesystem/wiki-root/raw
      schema: core/signal-envelope.schema.json
      signal_type: meeting-raw
    - target: local-filesystem/wiki-root/wiki
      schema: core/signal-envelope.schema.json
      signal_type: meeting-digest
    - target: polymath-sa-wiki/write_queue
      schema: core/signal-envelope.schema.json
      signal_type: meeting-summary

triggers:
  - "整理最近的会议"
  - "帮我总结一下昨天的会"
  - "meeting summary"
  - "会议纪要整理"
  - "整理会议"
  - "会议总结"

deprecates: []
