name: supper-local-wiki-init
version: 0.1.1
stage: beta
owners:
  - Carey8175

description_for_install: |
  Initialize a local LLM-maintained wiki for an SA, inspired by Karpathy's
  LLM Wiki pattern. Creates the full directory structure (raw/, wiki/entities/,
  wiki/concepts/, wiki/interactions/, wiki/sources/), and writes SCHEMA.md,
  PROMPTS.md, README.md, and starter index/log files. The wiki is tuned for the
  BytePlus SA workflow: customers, products, and the relationships between them
  as first-class entities.

depends_on:
  skills: []
  binaries: []
  env: []

io_contract:
  reads: []
  writes:
    - target: local-filesystem/wiki-root
      schema: core/signal-envelope.schema.json
      signal_type: local-wiki-init

triggers:
  - "初始化本地 wiki"
  - "set up my local wiki"
  - "create my SA wiki"
  - "init local wiki"
  - "我想建一个本地知识库"
  - "local wiki"
  - "本地知识库"
  - "llm wiki"

deprecates: []
