name: polym-sdr-leads-qualification
version: 0.2.0
stage: beta
owners:
  - mittulmadaan

description_for_install: |
  SDR lead qualification engine for Trigify exports. Ingests a Trigify-style CSV,
  normalises and enriches each lead, runs a single-call LLM scoring pass that
  extracts evidence and computes sub-scores (segment, buyer, pain, workflow,
  commercial fit), applies deterministic Python routing, and writes
  qualified/review/disqualified CSVs plus per-lead JSON artifacts. Ships with
  campaign packs for Seedance and Kling. Supports any LiteLLM-compatible provider
  (Anthropic, OpenAI, Google Gemini, BytePlus Ark, Azure, and more) via
  LLM_PROVIDER + LLM_MODEL + LLM_API_KEY. LiteLLM is auto-installed on first run.

depends_on:
  skills: []
  binaries:
    - python3: ">=3.10"
  env:
    - LLM_API_KEY
    - LLM_MODEL

io_contract:
  reads:
    - local-filesystem/trigify-csv
  writes: []

triggers:
  - "score trigify leads"
  - "qualify leads"
  - "lead qualification"
  - "SDR leads"
  - "trigify csv"
  - "process trigify"
  - "qualify trigify"
  - "score leads"
  - "lead scoring"
  - "outbound lead qualification"
  - "enrich and score leads"

deprecates: []
