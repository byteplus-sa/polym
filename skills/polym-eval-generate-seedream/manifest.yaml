name: polym-eval-generate-seedream
version: 0.2.0
stage: beta
owners:
  - Carey8175
description_for_install: |
  Generate or edit images with BytePlus Seedream models. Supports reference
  images, output sizes, seeds, guidance scale, prompt optimization, and streaming.
depends_on:
  skills: []
  binaries:
    - python3: ">=3.10"
  env:
    - BYTEPLUS_API_KEY
io_contract:
  reads:
    - local-filesystem/reference-images
  writes:
    - target: local-filesystem/generated-assets
      schema: core/signal-envelope.schema.json
      signal_type: generated-image
triggers:
  - "generate Seedream"
  - "Seedream image"
  - "seedream edit"
deprecates: []
