name: polym-autocase-image-gen
version: 0.1.0
stage: experimental
owners:
  - Carey8175

description_for_install: |
  Generate images with gpt-image-2 (ChatGPT-image-2) by driving the internal
  AutoCase playground (autocase.bytedance.net/arena) in a real Chrome browser.
  Supports text-to-image and image-to-image with reference photos. Stopgap
  until AIDP exposes gpt-image-2 — once it does, prefer polym-eval-generate-gpt-image
  with --model gpt-image-2 (much faster, scriptable, no Chrome extension required).

depends_on:
  skills: []
  binaries: []
  env: []

io_contract:
  reads: []
  writes: []

triggers:
  - "gpt-image-2"
  - "ChatGPT-image-2"
  - "autocase playground"
  - "用 gpt-image-2 出图"

deprecates: []
