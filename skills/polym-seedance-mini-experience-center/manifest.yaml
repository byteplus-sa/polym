  skills: []
  binaries: []
  env: []

io_contract:
  reads: []
  writes: []

triggers:
  - "seedance mini"
  - "dreamina mini"
  - "mini 批量生成"
  - "用 mini 出视频"
  - "experience center 批量"

deprecates: []
