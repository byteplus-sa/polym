name: polym-im-digest
version: 0.7.2
stage: beta
owners:
  - Carey8175

description_for_install: |
  Pulls yesterday's Lark group and P2P messages via lark-cli, filters
  long-lived local blacklist exclusions, organises the remaining activity into
  priority-first SA intelligence with ModelArk / MaaS product-line focus,
  offering/model taxonomy, owner/deadline tracking, product context, and
  Feishu-doc visual styling guidance. It
  materialises a standalone Feishu digest doc for the day and writes the digest
  to both the local wiki (raw snapshot + wiki entity pages) and the Lark SA Wiki
  (via write_queue). It can also help create a Codex routine/automation for
  recurring daily execution; recurrence is owned by Codex, not by the skill.

depends_on:
  skills:
    - polym-sa-wiki: "^0.2"
    - polym-local-wiki-init: "^0.1"
  binaries:
    - lark-cli: ">=1.0.20"
  env: []

io_contract:
  reads:
    - local-filesystem/wiki-root/wiki/entities/customers
    - local-filesystem/wiki-root/config/polym-im-digest-blacklist.json
    - local-filesystem/home-config/polym/im-digest/blacklist.json
    - lark-im/chat-list
    - lark-im/chat-messages
  writes:
    - target: local-filesystem/wiki-root/config/polym-im-digest-blacklist.json
      schema: skills/polym-im-digest/references/blacklist.md
      signal_type: im-digest-blacklist
    - target: local-filesystem/home-config/polym/im-digest/blacklist.json
      schema: skills/polym-im-digest/references/blacklist.md
      signal_type: im-digest-blacklist
    - target: lark-doc/im-digest-doc
      schema: skills/polym-im-digest/references/digest-schema.md
      signal_type: im-digest-doc
    - target: local-filesystem/wiki-root/raw
      schema: core/signal-envelope.schema.json
      signal_type: im-raw-snapshot
    - target: local-filesystem/wiki-root/wiki
      schema: core/signal-envelope.schema.json
      signal_type: im-digest-wiki
    - target: polym-sa-wiki/write_queue
      schema: core/signal-envelope.schema.json
      signal_type: im-digest

triggers:
  - "整理昨天的消息"
  - "拉一下昨天的群消息"
  - "daily IM digest"
  - "im digest"
  - "帮我总结一下昨天的 IM"
  - "把昨天的聊天记录整理进 wiki"
  - "IM 消息整理"
  - "把这个群加入 IM digest 黑名单"
  - "以后不要拉某人的 IM digest"
  - "列出 IM digest 黑名单"
  - "每天自动跑 IM digest"
  - "帮我创建每天跑 IM digest 的 Codex routine"
  - "优化 IM digest 格式"

deprecates: []
